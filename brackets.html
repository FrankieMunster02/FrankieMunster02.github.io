<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beer Olympics Brackets</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,700;0,900;1,400&family=Rubik+Mono+One&family=Rubik+Dirt&family=Rubik+Wet+Paint&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04040e;--surface:#0c0c1a;--surface2:#131325;--text:#e8e8ff;--muted:#5a5a80;--accent:#ff3c6e;--gold:#ffd84d;--green:#39ff9a;--blue:#00d4ff;--purple:#c042ff}
body{background:var(--bg);color:var(--text);font-family:'Rubik',sans-serif;min-height:100vh;overflow-x:hidden}
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite}@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.9}}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:5}
.ticker-wrap{position:relative;z-index:10;background:rgba(4,4,14,.9);border-bottom:1px solid rgba(255,216,77,.25);overflow:hidden;height:34px;display:flex;align-items:center;backdrop-filter:blur(8px)}
.ticker-track{display:flex;animation:ticker 38s linear infinite;white-space:nowrap;gap:80px;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:.8px;text-transform:uppercase}.sep{color:var(--muted);margin:0 12px}@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.back-nav{position:relative;z-index:1;display:inline-flex;padding:1rem 1.5rem;color:var(--muted);font-size:13px;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:.5px}.back-nav:hover{color:var(--gold)}
.hero{position:relative;z-index:1;text-align:center;padding:2.5rem 1rem 1.5rem}.eyebrow{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:1rem}.title{font-family:'Rubik Wet Paint',cursive;font-size:clamp(3rem,9vw,7rem);line-height:.9;color:var(--gold);filter:drop-shadow(0 0 26px rgba(255,216,77,.25))}.title span{color:var(--green)}.sub{font-family:'Rubik Dirt',cursive;color:var(--accent);font-size:clamp(1rem,2.5vw,1.35rem);margin-top:1rem}
.nav-row{position:relative;z-index:1;display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap;margin:1.5rem 0 2.5rem}.nav-btn{font-family:'Rubik',sans-serif;font-weight:700;font-size:14px;padding:.65rem 1.2rem;border-radius:50px;border:none;cursor:pointer;text-decoration:none;transition:.15s;display:inline-flex;align-items:center;gap:.5rem}.nav-btn:hover{transform:translateY(-2px)}.primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(255,60,110,.25)}.secondary{background:transparent;color:var(--gold);border:1.5px solid rgba(255,216,77,.5)}.secondary:hover{background:rgba(255,216,77,.07);border-color:var(--gold)}
.section{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 1.25rem 3rem}.notice{background:rgba(255,216,77,.06);border:1px solid rgba(255,216,77,.16);border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.5rem;color:var(--gold);font-size:13px;line-height:1.5}.game-tabs{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.25rem}.game-tab{background:var(--surface);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:50px;padding:.55rem 1rem;font-family:'Rubik',sans-serif;font-weight:700;cursor:pointer}.game-tab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.bracket-card{background:rgba(12,12,26,.82);border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:1.25rem;backdrop-filter:blur(12px);box-shadow:0 0 40px rgba(0,0,0,.25)}.bracket-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}.bracket-title{font-family:'Rubik Mono One',monospace;font-size:1rem;color:var(--blue);letter-spacing:-.5px}.tools{display:flex;gap:.5rem;flex-wrap:wrap}.tool-btn{background:var(--surface2);border:1px solid rgba(255,255,255,.09);border-radius:10px;color:var(--text);font-family:'Rubik',sans-serif;font-weight:700;font-size:12px;padding:.5rem .75rem;cursor:pointer}.tool-btn:hover{border-color:var(--green);color:var(--green)}
.bracket{display:flex;gap:1.25rem;overflow-x:auto;padding:1rem .25rem 1.5rem}.round{min-width:230px;display:flex;flex-direction:column;justify-content:space-around;gap:1rem}.round-name{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:var(--muted);font-weight:800;margin-bottom:.4rem}.match{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:.55rem;box-shadow:0 0 22px rgba(0,0,0,.12)}.slot{display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.55rem .65rem;border-radius:10px;cursor:pointer;border:1px solid transparent;min-height:40px}.slot:hover{background:rgba(255,255,255,.04)}.slot + .slot{margin-top:.35rem}.slot.winner{background:rgba(57,255,154,.1);border-color:rgba(57,255,154,.35);color:var(--green)}.team-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.seed{font-family:'Rubik Mono One',monospace;font-size:10px;color:var(--muted)}.empty-slot{color:var(--muted);font-style:italic}.champion-box{margin-top:1rem;background:linear-gradient(135deg,rgba(255,216,77,.13),rgba(57,255,154,.08));border:1px solid rgba(255,216,77,.25);border-radius:18px;padding:1rem;text-align:center}.champion-label{font-size:10px;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase;font-weight:900}.champion-name{font-family:'Rubik Wet Paint',cursive;font-size:2rem;color:var(--green);margin-top:.25rem}.empty{color:var(--muted);text-align:center;padding:2rem;font-style:italic}.confetti-piece{position:fixed;pointer-events:none;z-index:999;animation:confettiFall 2.5s ease-in forwards}@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(900deg)}}
@media(max-width:700px){.round{min-width:210px}.bracket-card{padding:1rem}.hero{padding-top:1.5rem}}
</style>
</head>
<body>
<div id="starfield"></div>
<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack">BRACKETS LOADING...</div></div>
<a class="back-nav" href="index.html">&#8592; Back to Teams</a>
<div class="hero"><div class="eyebrow">Tournament Central</div><h1 class="title">GAME<br><span>BRACKETS</span></h1><p class="sub" id="subText">Pick winners. Crown chaos.</p></div>
<div class="nav-row"><a href="index.html" class="nav-btn secondary">All Teams</a><a href="funzone.html" class="nav-btn secondary">Fun Zone</a><button class="nav-btn primary" onclick="autoBuildAll()">Build Brackets</button></div>
<div class="section"><div class="notice">Add teams and games from <b>Event Settings</b> on the main page. This page saves each bracket in your browser using the same localStorage as your team pages.</div><div class="game-tabs" id="gameTabs"></div><div id="bracketArea"></div></div>
<script>
let state={eventName:'',subtitle:'',announcerName:'',announcer:'',games:[],teams:[],brackets:{}};
let activeGame='';
function load(){const saved=localStorage.getItem('beerOlympicsState');if(saved)try{state=JSON.parse(saved)}catch(e){};if(!state.games)state.games=[];if(!state.teams)state.teams=[];if(!state.brackets)state.brackets={};activeGame=state.games[0]||'';render();}
function save(){localStorage.setItem('beerOlympicsState',JSON.stringify(state));}
function nextPowerOfTwo(n){let p=1;while(p<n)p*=2;return Math.max(p,2)}
function makeBracket(game){const teams=[...state.teams].map((t,i)=>({id:t.id,name:t.name,seed:i+1,color:t.color,emoji:t.emoji}));const size=nextPowerOfTwo(teams.length||2);while(teams.length<size)teams.push(null);let rounds=[];let first=[];for(let i=0;i<size;i+=2)first.push({slots:[teams[i],teams[i+1]],winner:null});rounds.push(first);let matches=size/4;while(matches>=1){rounds.push(Array.from({length:matches},()=>({slots:[null,null],winner:null})));matches=Math.floor(matches/2)}state.brackets[game]={game,rounds,updated:Date.now()};save();}
function autoBuildAll(){if(!state.games.length||!state.teams.length){alert('Add at least one game and two teams first.');return}state.games.forEach(g=>makeBracket(g));activeGame=state.games[0];render();burst();}
function roundName(i,total){if(i===total-1)return 'Finals';if(i===total-2)return 'Semifinals';if(i===0)return 'Round 1';return 'Round '+(i+1)}
function chooseWinner(r,m,s){const b=state.brackets[activeGame];const team=b.rounds[r][m].slots[s];if(!team)return;b.rounds[r][m].winner=team;if(r<b.rounds.length-1){const nextMatch=Math.floor(m/2);const nextSlot=m%2;b.rounds[r+1][nextMatch].slots[nextSlot]=team;for(let rr=r+1;rr<b.rounds.length;rr++){for(const match of b.rounds[rr]){if(match.winner&&match.winner.id!==team.id&&rr===r+1&&b.rounds[rr].indexOf(match)===nextMatch){match.winner=null}}}}save();renderBracket();if(r===b.rounds.length-1)burst();}
function clearBracket(){if(!activeGame)return;if(confirm('Reset this game bracket?')){makeBracket(activeGame);render();}}
function render(){document.getElementById('subText').textContent=state.eventName?state.eventName+' Tournament':'Pick winners. Crown chaos.';const event=state.eventName||'Beer Olympics';const games=state.games.length?state.games.join(' — '):'No games yet';const seg=`<span>${event.toUpperCase()}</span><span class="sep">—</span><span>${games}</span><span class="sep">—</span>`;document.getElementById('tickerTrack').innerHTML=seg+seg;renderTabs();renderBracket();}
function renderTabs(){const tabs=document.getElementById('gameTabs');if(!state.games.length){tabs.innerHTML='';return}tabs.innerHTML=state.games.map(g=>`<button class="game-tab ${g===activeGame?'active':''}" onclick="activeGame='${esc(g)}';render()">${g}</button>`).join('')}
function renderBracket(){const area=document.getElementById('bracketArea');if(!state.games.length){area.innerHTML='<div class="empty">No games yet. Go back to the main page and add games in Event Settings.</div>';return}if(state.teams.length<2){area.innerHTML='<div class="empty">Add at least two teams before building brackets.</div>';return}if(!state.brackets[activeGame])makeBracket(activeGame);const b=state.brackets[activeGame];let champ='Not crowned yet';const final=b.rounds[b.rounds.length-1]?.[0];if(final?.winner)champ=(final.winner.emoji?final.winner.emoji+' ':'')+final.winner.name;area.innerHTML=`<div class="bracket-card"><div class="bracket-head"><div class="bracket-title">${activeGame}</div><div class="tools"><button class="tool-btn" onclick="makeBracket(activeGame);render()">Shuffle/Rebuild</button><button class="tool-btn" onclick="clearBracket()">Reset</button></div></div><div class="bracket">${b.rounds.map((round,ri)=>`<div class="round"><div class="round-name">${roundName(ri,b.rounds.length)}</div>${round.map((match,mi)=>`<div class="match">${[0,1].map(si=>slotHTML(match,ri,mi,si)).join('')}</div>`).join('')}</div>`).join('')}</div><div class="champion-box"><div class="champion-label">Champion</div><div class="champion-name">${champ}</div></div></div>`;}
function slotHTML(match,ri,mi,si){const t=match.slots[si];const win=match.winner&&t&&match.winner.id===t.id;return `<div class="slot ${win?'winner':''}" onclick="chooseWinner(${ri},${mi},${si})"><span class="team-name ${!t?'empty-slot':''}">${t?(t.emoji? t.emoji+' ':'')+t.name:'BYE / TBD'}</span><span class="seed">${t?'#'+t.seed:''}</span></div>`}
function esc(s){return String(s).replace(/'/g,"\\'")}
function burst(){const colors=['#ffd84d','#ff3c6e','#39ff9a','#00d4ff','#c042ff'];for(let i=0;i<55;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}vw;top:0;background:${colors[Math.random()*colors.length|0]};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}}
function buildStars(){const sf=document.getElementById('starfield');for(let i=0;i<160;i++){const s=document.createElement('div');s.className='star';const size=Math.random()<.85?.5+Math.random():1.5+Math.random();s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s`;sf.appendChild(s)}}
buildStars();load();
</script>
</body>
</html>
